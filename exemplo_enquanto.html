<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exemplo enquanto js</title>
</head>
<body>
    <button onclick="contar"()>contar</button>

    <script>
        function contar(){
            let numero = Number(prompt("Digite um numero:"))

            while(numero > 0){
                alert(numero)

                numero--
            }
        }
    </script>
</body>
</html>
